spring:
  datasource:
    url: jdbc:mysql://localhost:3306/springboot3_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root # ?????????
    password: 123456 # ????????
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  configuration:
    map-underscore-to-camel-case: true  # ??????????
  mapper-locations: classpath:mapper/*.xml

# swagger-ui custom path
springdoc:
  swagger-ui:
    path: /swagger-ui.html

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    # 下划线转驼峰自动映射（必须开启，匹配t_user表字段）
    map-underscore-to-camel-case: true
    # 控制台打印SQL日志，方便调试
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 全局主键自增策略
      id-type: auto
